    <div class="post-body" itemprop="articleBody">
        <h3 id="插入思路"><a href="#插入思路" class="headerlink" title="插入思路"></a>插入思路</h3><p>我好像也没弄清楚</p>
<h3 id="具体代码"><a href="#具体代码" class="headerlink" title="具体代码"></a>具体代码</h3><h4 id="结构体"><a href="#结构体" class="headerlink" title="结构体"></a>结构体</h4><figure class="highlight c"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">typedef</span> <span class="class"><span class="keyword">struct</span> <span class="title">node</span> &#123;</span><span class="comment">//node不能省略</span></span><br><span class="line">	<span class="keyword">int</span> num;</span><br><span class="line">	<span class="class"><span class="keyword">struct</span> <span class="title">node</span> *<span class="title">pNext</span>;</span><span class="comment">//指针大小是固定的</span></span><br><span class="line">&#125;Node_t, *pNode_t;</span><br></pre></td></tr></table></figure>

<h4 id="头插法"><a href="#头插法" class="headerlink" title="头插法"></a>头插法</h4><figure class="highlight c"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br></pre></td><td class="code"><pre><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">headInsert</span><span class="params">(pNode_t* ppHead, pNode_t* ppTail, <span class="keyword">int</span> num)</span> </span>&#123;</span><br><span class="line">	pNode_t pNew = (pNode_t)<span class="built_in">malloc</span>(<span class="keyword">sizeof</span>(Node_t));<span class="comment">//分配Node_t的大小</span></span><br><span class="line">	<span class="built_in">memset</span>(pNew, <span class="number">0</span>, <span class="keyword">sizeof</span>(Node_t));</span><br><span class="line">	<span class="comment">//指针域已经是空指针</span></span><br><span class="line">	pNew-&gt;num = num;</span><br><span class="line"></span><br><span class="line">	<span class="keyword">if</span> (*ppHead == <span class="literal">NULL</span>) &#123;</span><br><span class="line">		*ppHead = pNew;</span><br><span class="line">		*ppTail = pNew;</span><br><span class="line">	&#125;</span><br><span class="line">	<span class="keyword">else</span> &#123;</span><br><span class="line">		pNew-&gt;pNext = *ppHead;</span><br><span class="line">		*ppHead = pNew;</span><br><span class="line">	&#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

<p><img src="https://i.loli.net/2021/07/18/5gtGsAR2NDUkmap.jpg" alt="headInsert.jpg"></p>
<h4 id="尾插法"><a href="#尾插法" class="headerlink" title="尾插法"></a>尾插法</h4><figure class="highlight c"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br></pre></td><td class="code"><pre><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">tailInsert</span><span class="params">(pNode_t* ppHead, pNode_t* ppTail, <span class="keyword">int</span> num)</span> </span>&#123;</span><br><span class="line">	pNode_t pNew = (pNode_t)<span class="built_in">calloc</span>(<span class="number">1</span>,<span class="keyword">sizeof</span>(Node_t));<span class="comment">//分配Node_t的大小</span></span><br><span class="line">	<span class="comment">//malloc+memset</span></span><br><span class="line">	pNew-&gt;num = num;</span><br><span class="line"></span><br><span class="line">	<span class="keyword">if</span> (*ppHead == <span class="literal">NULL</span>) &#123;</span><br><span class="line">		*ppHead = pNew;</span><br><span class="line">		*ppTail = pNew;</span><br><span class="line">	&#125;</span><br><span class="line">	<span class="keyword">else</span> &#123;</span><br><span class="line">		(*ppTail)-&gt;pNext = pNew;</span><br><span class="line">		*ppTail = pNew;</span><br><span class="line">	&#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

<p><img src="https://i.loli.net/2021/07/18/qpiPb5tvyeTAFQm.jpg" alt="tailInsert.jpg"></p>
<h4 id="完整代码"><a href="#完整代码" class="headerlink" title="完整代码"></a>完整代码</h4><figure class="highlight c"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br></pre></td><td class="code"><pre><span class="line">node.h:</span><br><span class="line"><span class="keyword">typedef</span> <span class="class"><span class="keyword">struct</span> <span class="title">node</span> &#123;</span><span class="comment">//node不能省略</span></span><br><span class="line">	<span class="keyword">int</span> num;</span><br><span class="line">	<span class="class"><span class="keyword">struct</span> <span class="title">node</span> *<span class="title">pNext</span>;</span><span class="comment">//指针大小是固定的</span></span><br><span class="line">&#125;Node_t, *pNode_t;</span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">headInsert</span><span class="params">(pNode_t* ppHead, pNode_t* ppTail, <span class="keyword">int</span> num)</span></span>;</span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">tailInsert</span><span class="params">(pNode_t* ppHead, pNode_t* ppTail, <span class="keyword">int</span> num)</span></span>;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="meta">#<span class="meta-keyword">define</span> _CRT_SECURE_NO_WARNINGS</span></span><br><span class="line"><span class="meta">#<span class="meta-keyword">include</span><span class="meta-string">&lt;stdio.h&gt;</span></span></span><br><span class="line"><span class="meta">#<span class="meta-keyword">include</span><span class="meta-string">&lt;stdlib.h&gt;</span></span></span><br><span class="line"><span class="meta">#<span class="meta-keyword">include</span><span class="meta-string">&lt;string.h&gt;</span></span></span><br><span class="line"><span class="meta">#<span class="meta-keyword">include</span> <span class="meta-string">&quot;node.h&quot;</span></span></span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">int</span> <span class="title">main</span><span class="params">()</span></span>&#123;</span><br><span class="line">	<span class="comment">//pHead&amp;pTail用来标识链表，一开始为空链表</span></span><br><span class="line">	pNode_t pHead = <span class="literal">NULL</span>;</span><br><span class="line">	pNode_t pTail = <span class="literal">NULL</span>;</span><br><span class="line">	<span class="keyword">int</span> num;</span><br><span class="line">	<span class="keyword">while</span> (<span class="built_in">scanf</span>(<span class="string">&quot;%d&quot;</span>, &amp;num) != EOF) &#123;</span><br><span class="line">		headInsert(&amp;pHead, &amp;pTail, num);</span><br><span class="line">		tailInsert(&amp;pHead, &amp;pTail, num);</span><br><span class="line">	&#125;</span><br><span class="line">&#125;</span><br><span class="line"><span class="comment">//头插法</span></span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">headInsert</span><span class="params">(pNode_t* ppHead, pNode_t* ppTail, <span class="keyword">int</span> num)</span> </span>&#123;</span><br><span class="line">	pNode_t pNew = (pNode_t)<span class="built_in">malloc</span>(<span class="keyword">sizeof</span>(Node_t));<span class="comment">//分配Node_t的大小</span></span><br><span class="line">	<span class="built_in">memset</span>(pNew, <span class="number">0</span>, <span class="keyword">sizeof</span>(Node_t));</span><br><span class="line">	<span class="comment">//指针域已经是空指针</span></span><br><span class="line">	pNew-&gt;num = num;</span><br><span class="line"></span><br><span class="line">	<span class="keyword">if</span> (*ppHead == <span class="literal">NULL</span>) &#123;</span><br><span class="line">		*ppHead = pNew;</span><br><span class="line">		*ppTail = pNew;</span><br><span class="line">	&#125;</span><br><span class="line">	<span class="keyword">else</span> &#123;</span><br><span class="line">		pNew-&gt;pNext = *ppHead;</span><br><span class="line">		*ppHead = pNew;</span><br><span class="line">	&#125;</span><br><span class="line">&#125;</span><br><span class="line"><span class="comment">//尾插法</span></span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">tailInsert</span><span class="params">(pNode_t* ppHead, pNode_t* ppTail, <span class="keyword">int</span> num)</span> </span>&#123;</span><br><span class="line">	pNode_t pNew = (pNode_t)<span class="built_in">calloc</span>(<span class="number">1</span>,<span class="keyword">sizeof</span>(Node_t));<span class="comment">//分配Node_t的大小</span></span><br><span class="line">	<span class="comment">//malloc+memset</span></span><br><span class="line">	pNew-&gt;num = num;</span><br><span class="line"></span><br><span class="line">	<span class="keyword">if</span> (*ppHead == <span class="literal">NULL</span>) &#123;</span><br><span class="line">		*ppHead = pNew;</span><br><span class="line">		*ppTail = pNew;</span><br><span class="line">	&#125;</span><br><span class="line">	<span class="keyword">else</span> &#123;</span><br><span class="line">		(*ppTail)-&gt;pNext = pNew;</span><br><span class="line">		*ppTail = pNew;</span><br><span class="line">	&#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
